<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Share My Location</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#a06bff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
    background: linear-gradient(135deg, #ff9fc9 0%, #a06bff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 40px 32px;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
  }
  .icon { font-size: 2.4rem; margin-bottom: 8px; }
  h1 { font-size: 1.4rem; margin: 0 0 8px; color: #2d2d3a; }
  p { color: #8a8a99; font-size: 0.9rem; max-width: 320px; margin: 0 auto 24px; }
  button {
    font-size: 1.05rem;
    font-weight: 600;
    padding: 18px 28px;
    min-height: 56px;
    margin: 6px 0;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    width: 100%;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
  #startBtn { background: #2e7d32; color: white; }
  #stopBtn { background: #c62828; color: white; display: none; }
  #status {
    margin-top: 20px;
    font-weight: 600;
    padding: 10px;
    border-radius: 10px;
  }
  .on { color: #2e7d32; background: #e8f5e9; }
  .off { color: #9a9aac; background: #f5f6fb; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">💗</div>
    <h1>Share your location?</h1>
    <p>
      If you say yes, your live location will be visible on your partner's
      dashboard until you stop sharing. Your browser will also ask you to
      approve location access separately.
    </p>

    <button id="startBtn">Yes, share my location</button>
    <button id="stopBtn">Stop sharing</button>

    <div id="status" class="off">Not sharing</div>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusDiv = document.getElementById('status');
    let watchId = null;

    function setSharingUI(isSharing) {
      startBtn.style.display = isSharing ? 'none' : 'inline-block';
      stopBtn.style.display = isSharing ? 'inline-block' : 'none';
      statusDiv.textContent = isSharing ? 'Sharing is ON' : 'Not sharing';
      statusDiv.className = isSharing ? 'on' : 'off';
    }

    async function startSharing() {
      if (!navigator.geolocation) {
        alert('Your browser does not support geolocation.');
        return;
      }

      await fetch('/api/start', { method: 'POST' });
      setSharingUI(true);

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          fetch('/api/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              accuracy: pos.coords.accuracy
            })
          });
        },
        (err) => {
          console.error(err);
          alert('Location permission denied or unavailable.');
          stopSharing();
        },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
      );
    }

    async function stopSharing() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      await fetch('/api/stop', { method: 'POST' });
      setSharingUI(false);
    }

    startBtn.addEventListener('click', startSharing);
    stopBtn.addEventListener('click', stopSharing);
  </script>
</body>
</html>
