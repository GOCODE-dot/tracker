<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Location Sharing</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6a8dff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
    background: linear-gradient(135deg, #6a8dff 0%, #a06bff 100%);
    padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    -webkit-tap-highlight-color: transparent;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 40px 32px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    text-align: center;
  }

  .icon {
    font-size: 2.4rem;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 1.4rem;
    margin: 0 0 8px;
    color: #2d2d3a;
  }

  .subtitle {
    color: #8a8a99;
    font-size: 0.9rem;
    margin-bottom: 28px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    background: #f5f6fb;
    border-radius: 14px;
    padding: 18px 18px;
    min-height: 64px;
    margin-bottom: 14px;
    touch-action: manipulation;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    text-align: left;
  }

  .link-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    background: #eef0fb;
  }

  .link-btn .emoji {
    font-size: 1.6rem;
    flex-shrink: 0;
  }

  .link-text {
    display: flex;
    flex-direction: column;
  }

  .link-title {
    font-weight: 600;
    color: #2d2d3a;
    font-size: 1rem;
  }

  .link-desc {
    font-size: 0.8rem;
    color: #9a9aac;
  }

  .her-link { border-left: 4px solid #ff6b9d; }
  .dashboard-link { border-left: 4px solid #6a8dff; }

  footer {
    margin-top: 24px;
    font-size: 0.75rem;
    color: #b0b0c0;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📍</div>
    <h1>Consensual Location Sharing</h1>
    <p class="subtitle">Simple, transparent, opt-in location sharing between two people</p>

    <a class="link-btn her-link" href="/her">
      <div class="emoji">💗</div>
      <div class="link-text">
        <span class="link-title">Sharer page</span>
        <span class="link-desc">Her link — share or stop anytime</span>
      </div>
    </a>

    <a class="link-btn dashboard-link" href="/dashboard">
      <div class="emoji">🗺️</div>
      <div class="link-text">
        <span class="link-title">Viewer dashboard</span>
        <span class="link-desc">Your link — see her live location</span>
      </div>
    </a>

    <footer>Nothing is shared until she says yes.</footer>
  </div>
</body>
</html>
