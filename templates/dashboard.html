<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Location Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6a8dff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
  }
  #map { height: calc(100% - 90px); width: 100%; }
  #info {
    height: 90px;
    padding-bottom: env(safe-area-inset-bottom);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: linear-gradient(135deg, #6a8dff 0%, #a06bff 100%);
    color: white;
  }
  #statusText {
    font-size: 1.05rem;
    padding: 6px 18px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.18);
  }
  #updatedText {
    margin-top: 6px;
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.85);
  }
  .on { font-weight: 600; }
  .off { font-weight: 600; opacity: 0.85; }
</style>
</head>
<body>
  <div id="map"></div>
  <div id="info">
    <div id="statusText">Checking status...</div>
    <div id="updatedText"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Free map — OpenStreetMap tiles via Leaflet. No API key needed.
    const map = L.map('map').setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let marker = null;

    async function poll() {
      const res = await fetch('/api/location');
      const data = await res.json();

      const statusEl = document.getElementById('statusText');
      const updatedEl = document.getElementById('updatedText');

      if (!data.sharing || data.lat === null) {
        statusEl.textContent = 'Not currently sharing';
        statusEl.className = 'off';
        updatedEl.textContent = '';
        return;
      }

      statusEl.textContent = 'Sharing is ON';
      statusEl.className = 'on';
      updatedEl.textContent = 'Last updated: ' + new Date(data.updated_at).toLocaleTimeString();

      const pos = [data.lat, data.lng];
      if (!marker) {
        marker = L.marker(pos).addTo(map);
        map.setView(pos, 16);
      } else {
        marker.setLatLng(pos);
        map.panTo(pos);
      }
    }

    poll();
    setInterval(poll, 4000);
  </script>
</body>
</html>
